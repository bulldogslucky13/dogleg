name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
        env:
          VITE_POSTHOG_KEY: ${{ vars.VITE_POSTHOG_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # The submit-round function replays every round with the game engine, so a
  # change to engine odds or shot resolution must reach the referee or it will
  # reject legitimate rounds as tampered. Deployed unconditionally (it's fast
  # and idempotent) rather than behind a path filter — a missed filter is
  # exactly the silent breakage this job exists to prevent — and *before* the
  # site so the referee is never older than the clients submitting to it.
  functions:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # Checked before any setup work: a malformed credential is the most
      # likely failure here and it used to surface 20s in, as an opaque CLI
      # error, having already blocked the site deploy. Only the prefix is
      # ever inspected — the value is never echoed.
      - name: Check Supabase credentials
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$PROJECT_REF" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret or SUPABASE_PROJECT_REF variable is not set — the referee would drift behind the deployed client."
            exit 1
          fi
          case "$SUPABASE_ACCESS_TOKEN" in
            sbp_*) ;;
            sb_publishable_*)
              echo "::error::SUPABASE_ACCESS_TOKEN holds the publishable key. That one is public, ships in the bundle, and cannot deploy. Generate a personal access token (sbp_...) at https://supabase.com/dashboard/account/tokens"
              exit 1 ;;
            eyJ*)
              echo "::error::SUPABASE_ACCESS_TOKEN holds a JWT — almost certainly the service role key, which must never leave the dashboard. Generate a personal access token (sbp_...) at https://supabase.com/dashboard/account/tokens"
              exit 1 ;;
            *)
              echo "::error::SUPABASE_ACCESS_TOKEN is not a personal access token (expected to start with sbp_). Regenerate at https://supabase.com/dashboard/account/tokens and check for stray whitespace."
              exit 1 ;;
          esac
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:validator
      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          # Per-function verify_jwt lives in supabase/config.toml. The flag
          # below repeats what that file already says for submit-round, on
          # purpose: if config were ever not picked up, the function would
          # deploy with JWT verification ON and every anonymous submission
          # would 401 — a silent, total outage of the leaderboard. One
          # redundant flag is cheap insurance against that.
          supabase functions deploy submit-round \
            --project-ref "$PROJECT_REF" --no-verify-jwt --use-api
          supabase functions deploy link-account \
            --project-ref "$PROJECT_REF" --use-api

  deploy:
    needs: functions
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
